n class="post-meta-item-text">Waline：</span> <a title="waline" href="/817c058c/#waline" itemprop="discussionUrl"><span class="post-comments-count waline-comment-count" data-path="/817c058c/" itemprop="commentCount"></span></a></span></div></div></header><div class="post-body" itemprop="articleBody"><p>第二次作业</p><p>第一题：</p><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;stdio.h&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="type">int</span> <span class="title function_">count_inversions</span><span class="params">(<span class="type">int</span> arr[], <span class="type">int</span> n)</span> &#123;</span><br><span class="line">    <span class="type">int</span> count = <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; n; i++) &#123;</span><br><span class="line">        <span class="keyword">for</span> (<span class="type">int</span> j = i + <span class="number">1</span>; j &lt; n; j++) &#123;</span><br><span class="line">            <span class="keyword">if</span> (arr[i] &gt; arr[j]) &#123;</span><br><span class="line">                count++;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> count;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="type">int</span> <span class="title function_">main</span><span class="params">()</span> &#123;</span><br><span class="line">    <span class="type">int</span> arr[] = &#123;<span class="number">3</span>, <span class="number">1</span>, <span class="number">4</span>, <span class="number">5</span>, <span class="number">2</span>&#125;; <span class="comment">//此处添加要判断逆序对的数组</span></span><br><span class="line">    <span class="type">int</span> n = <span class="keyword">sizeof</span>(arr) / <span class="keyword">sizeof</span>(arr[<span class="number">0</span>]);</span><br><span class="line">    </span><br><span class="line">    <span class="type">int</span> result = count_inversions(arr, n);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">&quot;逆序对的个数是: %d\n&quot;</span>, result);</span><br><span class="line">    </span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure><p>第二题：</p><figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;vector&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;unordered_map&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">subarraySumEqualsK</span><span class="params">(vector&lt;<span class="type">int</span>&gt;&amp; nums, <span class="type">int</span> k)</span> </span>&#123;</span><br><span class="line">    unordered_map&lt;<span class="type">int</span>, <span class="type">int</span>&gt; prefixSumCount;</span><br><span class="line">    prefixSumCount[<span class="number">0</span>] = <span class="number">1</span>;</span><br><span class="line"></span><br><span class="line">    <span class="type">int</span> count = <span class="number">0</span>;</span><br><span class="line">    <span class="type">int</span> sum = <span class="number">0</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; nums.<span class="built_in">size</span>(); i++) &#123;</span><br><span class="line">        sum += nums[i];</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (prefixSumCount.<span class="built_in">find</span>(sum - k) != prefixSumCount.<span class="built_in">end</span>()) &#123;</span><br><span class="line">            count += prefixSumCount[sum - k];</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        prefixSumCount[sum]++;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> count;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    vector&lt;<span class="type">int</span>&gt; nums = &#123;<span class="number">2</span>, <span class="number">1</span>, <span class="number">-1</span>, <span class="number">1</span>, <span class="number">2</span>&#125;;</span><br><span class="line">    <span class="type">int</span> k = <span class="number">3</span>;</span><br><span class="line">    cout &lt;&lt; <span class="string">&quot;和为 &quot;</span> &lt;&lt; k &lt;&lt; <span class="string">&quot; 的子数组个数是: &quot;</span> &lt;&lt; <span class="built_in">subarraySumEqualsK</span>(nums, k) &lt;&lt; endl;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure><hr><p>第三次作业:</p><p>第一题：</p><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line">第一次称重：</span><br><span class="line"></span><br><span class="line">将硬币分成两组，每组 7 个。</span><br><span class="line">第一组：&#123;0, 1, 2, 3, 4, 5, 6&#125;</span><br><span class="line">第二组：&#123;7, 8, 9, 10, 11, 12, 13&#125;</span><br><span class="line">将这两组硬币放在天平两侧：</span><br><span class="line"></span><br><span class="line">如果两边重量相等，那么假币不在这些硬币中，但在这次称重中是假币比其他硬币重，所以假币一定在重的一侧。</span><br><span class="line">显然，第二组会比第一组重，因为假币（编号为 12）就在第二组。</span><br><span class="line">第二次称重：</span><br><span class="line"></span><br><span class="line">将重的那一组（&#123;7, 8, 9, 10, 11, 12, 13&#125;）再分成两组，每组 3 个，剩下 1 个单独放置。</span><br><span class="line">第三组：&#123;7, 8, 9&#125;</span><br><span class="line">第四组：&#123;10, 11, 12&#125;</span><br><span class="line">剩下硬币：&#123;13&#125;</span><br><span class="line">将第三组和第四组称重：</span><br><span class="line"></span><br><span class="line">如果两组重量相等，那么假币就是剩下的那枚硬币，即编号为 12。</span><br><span class="line">如果不相等，第四组会比第三组重，因为假币在其中。</span><br><span class="line">第三次称重：</span><br><span class="line"></span><br><span class="line">此时，我们只剩下编号为 10、11 和 12 的硬币。直接称量这三枚硬币中的两枚（例如 10 和 11）。</span><br><span class="line">如果两枚硬币重量相等，那么假币就是未称的那一枚硬币，即编号为 12。</span><br><span class="line">如果两枚硬币不相等，由于假币比其他硬币重，所以较重的那一枚硬币即为假币。</span><br></pre></td></tr></table></figure><p>第二题：</p><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br></pre></td><td class="code"><pre><span class="line">1. 以首元素作为基准的快速排序</span><br><span class="line">原始序列：</span><br><span class="line">&#123;66, 13, 51, 76, 81, 26, 57, 69, 23&#125;</span><br><span class="line"></span><br><span class="line">第一次划分（基准为 66）：</span><br><span class="line">我们选择 66 作为基准。</span><br><span class="line">将比 66 小的元素放在左边，比 66 大的元素放在右边。</span><br><span class="line">结果：&#123;13, 51, 26, 57, 23, 66, 76, 81, 69&#125;</span><br><span class="line">第二次划分（左部分，基准为 13）：</span><br><span class="line">对左边部分 &#123;13, 51, 26, 57, 23&#125;，基准是 13。</span><br><span class="line">将比 13 小的元素放在左边，比 13 大的放在右边。</span><br><span class="line">结果：&#123;13, 23, 51, 26, 57&#125;</span><br><span class="line">第三次划分（左部分的右边部分，基准为 51）：</span><br><span class="line">对 &#123;51, 26, 57&#125; 进行排序，基准是 51。</span><br><span class="line">结果：&#123;26, 51, 57&#125;</span><br><span class="line">现在左边部分排序完成，结果为：&#123;13, 23, 26, 51, 57&#125;。</span><br><span class="line"></span><br><span class="line">第四次划分（右部分，基准为 76）：</span><br><span class="line">对右边部分 &#123;76, 81, 69&#125; 进行排序，基准是 76。</span><br><span class="line">结果：&#123;69, 76, 81&#125;</span><br><span class="line">完整排序后结果为：&#123;13, 23, 26, 51, 57, 66, 69, 76, 81&#125;。</span><br><span class="line"></span><br><span class="line">2. 以中间元素作为基准的快速排序</span><br><span class="line">原始序列：</span><br><span class="line">&#123;66, 13, 51, 76, 81, 26, 57, 69, 23&#125;</span><br><span class="line"></span><br><span class="line">第一次划分（基准为 26，序列的中间元素）：</span><br><span class="line">中间元素是 26。</span><br><span class="line">将比 26 小的放在左边，比 26 大的放在右边。</span><br><span class="line">结果：&#123;13, 23, 26, 66, 81, 76, 57, 69, 51&#125;</span><br><span class="line">第二次划分（左部分，基准为 13）：</span><br><span class="line">左边部分是 &#123;13, 23&#125;，基准为 13。</span><br><span class="line">将比 13 小的放在左边，比 13 大的放在右边。</span><br><span class="line">结果：&#123;13, 23&#125;</span><br><span class="line">第三次划分（右部分，基准为 66）：</span><br><span class="line">右边部分是 &#123;66, 81, 76, 57, 69, 51&#125;，基准为 66。</span><br><span class="line">将比 66 小的放在左边，比 66 大的放在右边。</span><br><span class="line">结果：&#123;51, 57, 66, 81, 76, 69&#125;</span><br><span class="line">第四次划分（右部分的右部分，基准为 81）：</span><br><span class="line">对 &#123;81, 76, 69&#125; 进行排序，基准是 81。</span><br><span class="line">结果：&#123;76, 69, 81&#125;</span><br><span class="line">第五次划分（右部分的左边部分，基准为 57）：</span><br><span class="line">对 &#123;51, 57&#125; 进行排序，基准是 57。</span><br><span class="line">结果：&#123;51, 57&#125;</span><br><span class="line">最终完整排序后结果为：&#123;13, 23, 26, 51, 57, 66, 69, 76, 81&#125;。</span><br></pre></td></tr></table></figure></div><footer class="post-footer"></footer></article></div><div class="comments" id="waline"></div></div></main><footer class="footer"><div class="footer-inner"><div class="copyright">&copy; 2022 – <span itemprop="copyrightYear">2024</span> <span class="with-love"><i class="fa fa-heartsafas"></i> </span><span class="author" itemprop="copyrightHolder">AlphaUnkX</span></div></div></footer><div class="back-to-top" role="button" aria-label="返回顶部"><i class="fa fa-arrow-up fa-lg"></i> <span>0%</span></div><noscript><div class="noscript-warning">Theme NexT works best with JavaScript enabled</div></noscript><script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" integrity="sha256-XL2inqUJaslATFnHdJOi9GfQ60on8Wx1C2H8DYiN1xY=" crossorigin="anonymous"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js" integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.5.7/jquery.fancybox.min.js" integrity="sha256-yt2kYMy0w8AbtF89WXb2P1rfjcP/HTHLT7097U8Y5b8=" crossorigin="anonymous"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/lozad.js/1.16.0/lozad.min.js" integrity="sha256-mOFREFhqmHeQbXpK2lp4nA3qooVgACfh88fpJftLBbc=" crossorigin="anonymous"></script><script src="/js/comments.js"></script><script src="/js/utils.js"></script><script src="/js/motion.js"></script><script src="/js/next-boot.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/hexo-generator-searchdb/1.4.1/search.js" integrity="sha256-1kfA5uHPf65M5cphT2dvymhkuyHPQp5A53EGZOnOLmc=" crossorigin="anonymous"></script><script src="/js/third-party/search/local-search.js"></script><script src="/js/third-party/fancybox.js"></script><script src="/js/third-party/pace.js"></script><script class="next-config" data-name="waline" type="application/json">{"lang":"zh-CN","enable":
